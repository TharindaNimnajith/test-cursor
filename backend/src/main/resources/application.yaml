spring:
  application:
    name: meeting-room-booking-system
  datasource:
    url: jdbc:sqlite:meeting_rooms.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    open-in-view: false
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  threads:
    virtual:
      enabled: true

server:
  servlet:
    context-path: /api

logging:
  level:
    com.example.demo: trace

app:
  cors:
    allowed-origin: http://localhost:5173
