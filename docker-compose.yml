services:
  backend:  # Backend service (Spring Boot)
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"  # Expose backend on localhost:8080
    environment:
      - SPRING_PROFILES_ACTIVE=docker  # Activate docker profile
    volumes:
      - db-data:/app/data  # Persist SQLite database
    networks:
      - app-network

  frontend:  # Frontend service (React + Nginx)
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"  # Expose frontend on localhost:80
    environment:
      - BACKEND_URL=http://backend:8080  # Inject backend URL into Nginx template
    depends_on:
      - backend  # Ensure backend starts first
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
