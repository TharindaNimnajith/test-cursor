services:
  backend:  # Backend service (Spring Boot)
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"  # Expose backend on localhost:8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod  # Activate production profile
    volumes:
      - db-data:/app/data  # Persist SQLite database
    networks:
      - app-network

  frontend:  # Frontend service (React + Nginx)
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"  # Expose frontend on localhost:80
    depends_on:
      - backend  # Ensure backend starts first
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
